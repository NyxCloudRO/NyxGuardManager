# Admin HTTPS interface on 8443
server {
	listen 8443 ssl default_server;
	listen [::]:8443 ssl default_server;
	http2 on;

	server_name nyxguardmanager;
	root /app/frontend;
	access_log /dev/null;

	ssl_certificate /data/custom_ssl/admin.crt;
	ssl_certificate_key /data/custom_ssl/admin.key;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers off;
	ssl_session_timeout 1d;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-XSS-Protection "1; mode=block" always;
	add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

	# LAN Access Control — allow/deny rules auto-generated by NyxGuard Manager
	include /data/nginx/custom/lan_access[.]conf;

	# Themed 403 page for blocked LAN access
	error_page 403 /lan_blocked.html;
	location = /lan_blocked.html {
		root /var/www/nyxguard;
		internal;
	}

	location /api {
		return 302 /api/;
	}

	# Extended timeout for long-running operations (backup export/import, update manager, certificates).
	# Uses rewrite+proxy_pass (no URI suffix) because regex locations cannot have a URI in proxy_pass.
	location ~* ^/api/(settings/backup|nginx/certificates|update-manager) {
		add_header            X-Served-By $host;
		proxy_set_header Host $host;
		proxy_set_header      X-Forwarded-Scheme $scheme;
		proxy_set_header      X-Forwarded-Proto  $scheme;
		proxy_set_header      X-Forwarded-For    $remote_addr;
		rewrite ^/api/(.*)$ /$1 break;
		proxy_pass            http://127.0.0.1:3000;

		proxy_read_timeout 15m;
		proxy_send_timeout 15m;
	}

	location /api/ {
		add_header            X-Served-By $host;
		proxy_set_header Host $host;
		proxy_set_header      X-Forwarded-Scheme $scheme;
		proxy_set_header      X-Forwarded-Proto  $scheme;
		proxy_set_header      X-Forwarded-For    $remote_addr;
		proxy_pass            http://127.0.0.1:3000/;

		proxy_read_timeout 60s;
		proxy_send_timeout 60s;
	}

	# Dev cache-busting: keep JS/CSS revalidated so frontend overlay fixes show up
	# without repeated hard refreshes.
	location ^~ /assets/ {
		add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
		add_header Pragma "no-cache" always;
		add_header Expires "0" always;
		try_files $uri =404;
	}

	location / {
		add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
		add_header Pragma "no-cache" always;
		add_header Expires "0" always;

		index index.html;
		if ($request_uri ~ ^/(.*)\.html$) {
			return 302 /$1;
		}
		try_files $uri $uri.html $uri/ /index.html;
	}
}
